<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Library — The Backlog Ledger</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <strong>The Backlog Ledger</strong>
      <div class="topbar-right">
        <a href="/index.html" class="link">← Back</a>
      </div>
    </div>
  </header>

  <main class="container">
    <h1>Your Library</h1>
    <p class="subtitle" id="subtitle">Loading…</p>

    <div class="card">
      <div class="library-controls">
        <input id="search" type="text" placeholder="Search games…" />
        <select id="filter">
          <option value="all">All games</option>
          <option value="played">Played (>0 hrs)</option>
          <option value="unplayed">Unplayed</option>
        </select>
      </div>
      <div class="library-finder">
        <div class="finder-field">
          <label for="genre-filter">Genre</label>
          <select id="genre-filter" multiple size="4"></select>
        </div>
        <div class="finder-field">
          <label for="category-filter">Steam category / feature</label>
          <select id="category-filter" multiple size="4"></select>
        </div>
        <div class="finder-field finder-quick">
          <label>Play style</label>
          <div class="finder-chips">
            <button class="tb-btn finder-chip" type="button" data-quick-filter="solo">Solo</button>
            <button class="tb-btn finder-chip" type="button" data-quick-filter="localCoop">Local Co-op</button>
            <button class="tb-btn finder-chip" type="button" data-quick-filter="onlineCoop">Online Co-op</button>
            <button class="tb-btn finder-chip" type="button" data-quick-filter="localMultiplayer">Local Multiplayer</button>
            <button class="tb-btn finder-chip" type="button" data-quick-filter="controllerFriendly">Controller Friendly</button>
          </div>
          <button class="tb-btn" id="clear-finder" type="button">Clear filters</button>
        </div>
      </div>
      <div id="library-table">Loading…</div>
    </div>
  </main>

  <script src="/js/app.js"></script>
  <script>
    const profile = BL.getProfile();
    if (!profile) { window.location.href = '/profiles.html'; }

    let allGames = [];
    const finder = { genres: new Set(), categories: new Set(), quick: new Set() };
    const quickFilters = {
      solo: ['single-player', 'single player'],
      localCoop: ['shared/split screen co-op', 'shared/split screen coop', 'shared/split screen', 'local co-op', 'local coop', 'local cooperative'],
      onlineCoop: ['online co-op', 'online coop', 'online cooperative', 'co-op online'],
      localMultiplayer: ['local multiplayer', 'shared/split screen pvp', 'shared/split screen', 'local pvp', 'local multi-player'],
      controllerFriendly: ['full controller support', 'partial controller support', 'controller support'],
    };

    const arr = (g, key) => Array.isArray(g[key]) ? g[key] : [];
    const normMeta = s => String(s || '').toLowerCase().replace(/&amp;/g, '&').replace(/\s+/g, ' ').trim();
    const selectedValues = id => new Set([...document.getElementById(id).selectedOptions].map(o => o.value));
    function matchesQuick(g, key) {
      const cats = arr(g, 'categories').map(normMeta);
      return (quickFilters[key] || []).some(needle => cats.some(cat => cat.includes(needle)));
    }
    function matchesFinder(g) {
      if (finder.genres.size && !arr(g, 'genres').some(x => finder.genres.has(x))) return false;
      if (finder.categories.size && !arr(g, 'categories').some(x => finder.categories.has(x))) return false;
      for (const q of finder.quick) if (!matchesQuick(g, q)) return false;
      return true;
    }
    function renderFinderOptions() {
      const fill = (id, values, selected) => {
        document.getElementById(id).innerHTML = values.map(v =>
          `<option value="${escapeHtml(v)}" ${selected.has(v) ? 'selected' : ''}>${escapeHtml(v)}</option>`
        ).join('');
      };
      fill('genre-filter', [...new Set(allGames.flatMap(g => arr(g, 'genres')))].sort((a, b) => a.localeCompare(b)), finder.genres);
      fill('category-filter', [...new Set(allGames.flatMap(g => arr(g, 'categories')))].sort((a, b) => a.localeCompare(b)), finder.categories);
    }
    function updateQuickButtons() {
      document.querySelectorAll('.finder-chip').forEach(btn => {
        btn.classList.toggle('active', finder.quick.has(btn.dataset.quickFilter));
      });
    }

    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      const filter = document.getElementById('filter').value;
      let filtered = allGames;
      if (filter === 'played') filtered = filtered.filter(g => g.playtime_minutes > 0);
      if (filter === 'unplayed') filtered = filtered.filter(g => g.playtime_minutes === 0);
      if (search) filtered = filtered.filter(g => g.name.toLowerCase().includes(search));
      filtered = filtered.filter(matchesFinder);

      const el = document.getElementById('library-table');
      if (filtered.length === 0) {
        el.innerHTML = '<p class="muted">No games match.</p>';
        return;
      }
      el.innerHTML = '<table class="library"><thead><tr><th>Game</th><th>Hours</th><th>Last 2 weeks</th><th>Paid</th></tr></thead><tbody>'
        + filtered.map(g => `<tr>
            <td>${escapeHtml(g.name)}</td>
            <td>${(g.playtime_minutes / 60).toFixed(1)}</td>
            <td>${g.playtime_last_2weeks > 0 ? (g.playtime_last_2weeks / 60).toFixed(1) + ' h' : '—'}</td>
            <td>${String(g.price_estimate_source || '').includes('Gift/Guest Pass') ? 'Gifted' : (g.paid_price_cents != null ? '£' + (g.paid_price_cents / 100).toFixed(2) : '—')}</td>
          </tr>`).join('')
        + '</tbody></table>';
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function init() {
      try {
        const r = await fetch(`/api/users/${profile.id}/games`);
        const d = await r.json();
        allGames = d.games || [];
        renderFinderOptions();
        document.getElementById('subtitle').textContent =
          `${d.stats.total} games • ${d.stats.played} played • ${d.stats.unplayed} unplayed • ${d.stats.total_hours} total hours`;
        render();
      } catch (err) {
        document.getElementById('library-table').textContent = 'Error: ' + err.message;
      }
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('filter').addEventListener('change', render);
    document.getElementById('genre-filter').addEventListener('change', () => { finder.genres = selectedValues('genre-filter'); render(); });
    document.getElementById('category-filter').addEventListener('change', () => { finder.categories = selectedValues('category-filter'); render(); });
    document.querySelectorAll('.finder-chip').forEach(btn => btn.addEventListener('click', () => {
      const key = btn.dataset.quickFilter;
      if (finder.quick.has(key)) finder.quick.delete(key);
      else finder.quick.add(key);
      updateQuickButtons();
      render();
    }));
    document.getElementById('clear-finder').addEventListener('click', () => {
      finder.genres.clear();
      finder.categories.clear();
      finder.quick.clear();
      renderFinderOptions();
      updateQuickButtons();
      render();
    });
    init();
  </script>
</body>
</html>
